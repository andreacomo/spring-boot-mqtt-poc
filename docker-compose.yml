services:
  mosquitto:
    image: eclipse-mosquitto:latest
    ports:
      - "1883:1883"
      - "9883:9883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto-data:/mosquitto/data
    environment:
      - TZ=Europe/Rome

#  mqtt-web-ui:
#     image: hivemq/hivemq-web-client:latest
#     ports:
#       - "8080:80"
#     depends_on:
#       - mosquitto

volumes:
  mosquitto-data:
    driver: local
