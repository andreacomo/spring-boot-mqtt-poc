# MQTT listener
listener 1883
allow_anonymous true

# Persist subscriptions and queued QoS 1/2 messages across broker restarts
persistence true
persistence_location /mosquitto/data/
autosave_interval 5
autosave_on_changes true

# Optional web dashboard listener kept from image default (if used)
listener 9883
protocol http_api
http_dir /usr/share/mosquitto/dashboard

